<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="330" viewBox="0 0 1280 330" role="img" aria-labelledby="title desc">
  <title id="title">Figure 1. LLM token generation and language feedback pipeline</title>
  <desc id="desc">A vector diagram showing prompt context moving through tokenization, autoregressive decoding, candidate token generation, language frontend validation, and either accepted evidence or diagnostics for repair.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9f1239"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 700 16px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; rx: 10; }
      .accent { fill: #e0f2fe; stroke: #0369a1; }
      .ok { fill: #dcfce7; stroke: #15803d; }
      .warn { fill: #ffe4e6; stroke: #be123c; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
      .reject { fill: none; stroke: #9f1239; stroke-width: 2; stroke-dasharray: 6 5; marker-end: url(#arrow-red); }
    </style>
  </defs>
  <rect width="1280" height="330" fill="#ffffff"/>
  <text class="title" x="40" y="38">LLM token generation is filtered by language and tool feedback</text>

  <rect class="box" x="40" y="82" width="180" height="74"/>
  <text class="label" x="130" y="111" text-anchor="middle">Prompt context</text>
  <text class="small" x="130" y="134" text-anchor="middle">task, repo, prior tokens</text>

  <rect class="box" x="270" y="82" width="150" height="74"/>
  <text class="label" x="345" y="111" text-anchor="middle">Tokenizer</text>
  <text class="small" x="345" y="134" text-anchor="middle">subword vocabulary</text>

  <rect class="accent" x="470" y="82" width="185" height="74" rx="10"/>
  <text class="label" x="562" y="111" text-anchor="middle">Autoregressive</text>
  <text class="small" x="562" y="134" text-anchor="middle">next-token decoder</text>

  <rect class="box" x="705" y="82" width="185" height="74"/>
  <text class="label" x="798" y="111" text-anchor="middle">Candidate stream</text>
  <text class="small" x="798" y="134" text-anchor="middle">tokens, then bytes/source</text>

  <rect class="accent" x="940" y="82" width="250" height="74" rx="10"/>
  <text class="label" x="1065" y="111" text-anchor="middle">Language frontend</text>
  <text class="small" x="1065" y="134" text-anchor="middle">parse, resolve, typecheck</text>

  <rect class="ok" x="705" y="218" width="220" height="74" rx="10"/>
  <text class="label" x="815" y="247" text-anchor="middle">Accepted program</text>
  <text class="small" x="815" y="270" text-anchor="middle">AST, type facts, obligations</text>

  <rect class="ok" x="410" y="218" width="220" height="74" rx="10"/>
  <text class="label" x="520" y="247" text-anchor="middle">Evidence</text>
  <text class="small" x="520" y="270" text-anchor="middle">tests, execution, review</text>

  <rect class="warn" x="1010" y="218" width="230" height="74" rx="10"/>
  <text class="label" x="1125" y="247" text-anchor="middle">Diagnostics</text>
  <text class="small" x="1125" y="270" text-anchor="middle">repair signal for next attempt</text>

  <path class="arrow" d="M 220 119 L 270 119"/>
  <path class="arrow" d="M 420 119 L 470 119"/>
  <path class="arrow" d="M 655 119 L 705 119"/>
  <path class="arrow" d="M 890 119 L 940 119"/>
  <path class="arrow" d="M 1065 156 C 1065 190 900 190 835 218"/>
  <path class="arrow" d="M 705 255 L 630 255"/>
  <path class="reject" d="M 1125 156 L 1125 218"/>
  <path class="reject" d="M 1010 255 C 760 318 220 318 130 156"/>

  <text class="small" x="928" y="188" text-anchor="middle">accept</text>
  <text class="small" x="1174" y="190" text-anchor="middle" fill="#9f1239">reject</text>
</svg>
