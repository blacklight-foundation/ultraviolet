<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="570" viewBox="0 0 1100 570" role="img" aria-labelledby="title desc">
  <title id="title">Figure 2. Frontend projection from generated bytes to diagnostics, facts, and evidence</title>
  <desc id="desc">A vector diagram showing a generated byte stream entering the frontend projection function and splitting into rejection diagnostics or accepted syntax, type facts, proof obligations, runtime checks, tests, and review.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 22px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .box { fill: #f8fafc; stroke: #475569; stroke-width: 1.5; rx: 10; }
      .blue { fill: #e0f2fe; stroke: #0369a1; }
      .green { fill: #dcfce7; stroke: #15803d; }
      .red { fill: #ffe4e6; stroke: #be123c; }
      .amber { fill: #fef3c7; stroke: #b45309; }
      .arrow { fill: none; stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1100" height="570" fill="#ffffff"/>
  <text class="title" x="40" y="38">The frontend is a projection from text into rejection or checked obligations</text>

  <rect class="box" x="410" y="70" width="280" height="64"/>
  <text class="label" x="550" y="96" text-anchor="middle">Generated bytes or tokens</text>
  <text class="small" x="550" y="118" text-anchor="middle">candidate source text</text>

  <rect class="blue" x="390" y="170" width="320" height="72" rx="10"/>
  <text class="label" x="550" y="198" text-anchor="middle">Frontend projection F<tspan baseline-shift="sub" font-size="10px">L</tspan></text>
  <text class="small" x="550" y="222" text-anchor="middle">parse, aggregate, resolve, typecheck</text>

  <rect class="red" x="80" y="290" width="250" height="72" rx="10"/>
  <text class="label" x="205" y="318" text-anchor="middle">Reject</text>
  <text class="small" x="205" y="342" text-anchor="middle">diagnostics for repair</text>

  <rect class="green" x="470" y="290" width="160" height="72" rx="10"/>
  <text class="label" x="550" y="318" text-anchor="middle">AST</text>
  <text class="small" x="550" y="342" text-anchor="middle">accepted syntax</text>

  <rect class="green" x="430" y="410" width="240" height="72" rx="10"/>
  <text class="label" x="550" y="438" text-anchor="middle">Type facts</text>
  <text class="small" x="550" y="462" text-anchor="middle">bindings, modes, effects</text>

  <rect class="amber" x="740" y="290" width="280" height="72" rx="10"/>
  <text class="label" x="880" y="318" text-anchor="middle">Proof obligations</text>
  <text class="small" x="880" y="342" text-anchor="middle">capability, responsibility, state</text>

  <rect class="amber" x="740" y="410" width="280" height="72" rx="10"/>
  <text class="label" x="880" y="438" text-anchor="middle">Runtime/test evidence</text>
  <text class="small" x="880" y="462" text-anchor="middle">checks, source-native tests, review</text>

  <path class="arrow" d="M 550 134 L 550 170"/>
  <path class="arrow" d="M 390 206 C 290 206 205 250 205 290"/>
  <path class="arrow" d="M 550 242 L 550 290"/>
  <path class="arrow" d="M 550 362 L 550 410"/>
  <path class="arrow" d="M 630 326 L 740 326"/>
  <path class="arrow" d="M 880 362 L 880 410"/>
  <path class="arrow" d="M 740 446 L 670 446"/>

  <text class="small" x="310" y="234" text-anchor="middle">ill-formed</text>
  <text class="small" x="642" y="270" text-anchor="middle">accepted</text>
  <text class="small" x="707" y="316" text-anchor="middle">obligations</text>
</svg>
